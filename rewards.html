<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖励任务 - Voidwryte</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <button class="back-btn" onclick="Game.navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title">奖励任务</h1>
            <div class="page-actions">
                <button class="icon-btn" onclick="Game.navigateTo('profile.html')">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="rewards-container">
                <section class="reward-section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-calendar-check"></i>
                            <span>每日任务</span>
                        </div>
                        <span class="section-badge">每日刷新</span>
                    </div>
                    <div class="daily-tasks-list" id="daily-tasks-list">
                    </div>
                </section>

                <section class="reward-section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-trophy"></i>
                            <span>成就任务</span>
                        </div>
                        <span class="section-badge" id="achievements-count">0/12 已解锁</span>
                    </div>
                    <div class="achievements-grid" id="achievements-grid">
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="notification-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userData = GameStorage.getUserData();
            document.getElementById('achievements-count').textContent = userData.achievements.length + '/12 已解锁';
            initRewardsPage();
        });
    </script>
</body>
</html>
