<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Voidwryte</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <button class="back-btn" onclick="Game.navigateTo('index.html')">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title">个人中心</h1>
            <div class="page-actions">
                <button class="icon-btn" onclick="Game.navigateTo('settings.html')">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <main class="page-content">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-code"></i>
                        <span class="profile-level-badge" id="profile-level">Lv.1</span>
                    </div>
                    <div class="profile-info">
                        <h2 class="profile-name" id="profile-name">开发者</h2>
                        <p class="profile-title" id="profile-title">编程新手</p>
                        <div class="profile-xp-bar">
                            <div class="profile-xp-fill" id="profile-xp-fill" style="width: 0%;"></div>
                        </div>
                        <p class="profile-xp-text" id="profile-xp-text">0 / 100 XP</p>
                    </div>
                </div>

                <div class="profile-stats-grid">
                    <div class="profile-stat-card">
                        <i class="fas fa-layer-group"></i>
                        <div class="profile-stat-value" id="stat-levels">0</div>
                        <div class="profile-stat-label">已通关</div>
                    </div>
                    <div class="profile-stat-card">
                        <i class="fas fa-coins"></i>
                        <div class="profile-stat-value" id="stat-score">0</div>
                        <div class="profile-stat-label">总积分</div>
                    </div>
                    <div class="profile-stat-card">
                        <i class="fas fa-lightbulb"></i>
                        <div class="profile-stat-value" id="stat-hints">5</div>
                        <div class="profile-stat-label">提示次数</div>
                    </div>
                    <div class="profile-stat-card">
                        <i class="fas fa-medal"></i>
                        <div class="profile-stat-value" id="stat-achievements-count">0</div>
                        <div class="profile-stat-label">成就数</div>
                    </div>
                </div>

                <div class="profile-content">
                    <section class="profile-section">
                        <h3 class="profile-section-title">
                            <i class="fas fa-award"></i>
                            <span>我的徽章</span>
                        </h3>
                        <div class="badges-grid" id="badges-grid">
                        </div>
                    </section>

                    <section class="profile-section">
                        <h3 class="profile-section-title">
                            <i class="fas fa-history"></i>
                            <span>游戏记录</span>
                        </h3>
                        <div class="history-list" id="history-list">
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <div id="notification-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initProfilePage();
        });
    </script>
</body>
</html>
